name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile-check
        run: python -m compileall -q voice2cc.py

      - name: Ruff
        run: |
          pip install ruff
          ruff check voice2cc.py --select=E,F,W --ignore=E501

      - name: Confirm requirements.txt parses
        run: |
          pip install --dry-run -r requirements.txt || pip install -r requirements.txt --no-deps
